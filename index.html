<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" type="image/png" href="simple.png">
    <link rel="shortcut icon" type="image/png" href="simple.png">
    <link rel="apple-touch-icon" type="image/png" href="simple.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title> DakovvDen </title>
    <!-- Discord RPC (через Lanyard) -->
    <script src="https://cdn.jsdelivr.net/npm/lanyard.js@latest/dist/lanyard.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        /* Видеофон */
        #bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -2;
            object-fit: cover;
            opacity: 0.5;
        }

        /* Затемняющий слой поверх видео */
        .video-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 15, 30, 0.75);
            z-index: -1;
        }

        body {
            background: transparent;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            margin: 0;
        }

        .profile-card {
            max-width: 520px;
            width: 100%;
            background: rgba(18, 25, 45, 0.5); /* 50% прозрачности */
            backdrop-filter: blur(12px);
            border-radius: 3rem;
            padding: 2rem 1.8rem 2.2rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(66, 153, 225, 0.2);
            transition: all 0.2s ease;
            border: 1px solid rgba(96, 165, 250, 0.25);
        }

        .avatar-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 1.8rem;
        }

        .avatar-ring {
            background: linear-gradient(135deg, #5865F2, #7289DA);
            padding: 3px;
            border-radius: 50%;
            display: inline-block;
            margin-bottom: 1rem;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            background: #2c2f36;
            border: 2px solid #0f1117;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #b9c8ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .badge {
            background: #1e243b;
            padding: 0.25rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #a6c1ff;
            margin-top: 8px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            backdrop-filter: blur(4px);
        }

        .discord-rpc {
            background: rgba(0, 0, 0, 0.4);
            margin: 1.5rem 0 1.8rem;
            padding: 1rem 1.2rem;
            border-radius: 2rem;
            border-left: 4px solid #5865F2;
            transition: all 0.2s;
        }

        .rpc-status {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .rpc-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #2e3440;
            border: 2px solid #5865F2;
        }

        /* Стили для картинки активности */
        .activity-image {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: #2e3440;
            object-fit: cover;
        }

        .rpc-text {
            flex: 1;
        }

        .rpc-line {
            font-weight: 600;
            font-size: 0.95rem;
            color: #eef2ff;
        }

        .rpc-detail {
            font-size: 0.8rem;
            color: #9aa9c7;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 4px;
        }

        .green-dot {
            width: 10px;
            height: 10px;
            background: #23a55a;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 4px #23a55a;
        }

        .links-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin: 28px 0 20px;
        }

        .link-btn {
            background: rgba(20, 28, 48, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(88, 101, 242, 0.5);
            padding: 1rem 1rem;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.2s ease;
            text-decoration: none;
            color: white;
            font-weight: 600;
            font-size: 1.05rem;
            letter-spacing: -0.2px;
        }

        .link-btn:hover {
            background: #5865f2cc;
            border-color: #ffffff80;
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(88, 101, 242, 0.3);
        }

        .btn-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-icon {
            font-size: 1.6rem;
        }

        .arrow-icon {
            font-size: 1.4rem;
            opacity: 0.7;
        }

        .activity-footer {
            text-align: center;
            margin-top: 1.2rem;
            border-top: 1px dashed #2a345a;
            padding-top: 1rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 1rem;
            padding: 0.8rem;
        }

        .activity-name {
            font-size: 0.9rem;
            font-weight: 600;
            color: #b9c8ff;
            margin-bottom: 4px;
        }

        .activity-details {
            font-size: 0.7rem;
            color: #6c7aa8;
        }

        @media (max-width: 480px) {
            .profile-card {
                padding: 1.5rem;
            }
            .link-btn {
                padding: 0.8rem 1rem;
            }
        }

        .loading-rpc {
            color: #b9c4e3;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
    </style>
</head>
<body>

<!-- Видеофон -->
<video autoplay muted loop id="bg-video">
    <source src="background.mp4" type="video/mp4">
    Ваш браузер не поддерживает видео.
</video>
<div class="video-overlay"></div>

<div class="profile-card">
    <div class="avatar-section">
        <div class="avatar-ring">
            <img class="avatar" id="userAvatar" src="https://cdn.discordapp.com/avatars/489975528464449536/a_avatar_placeholder.png?size=160" alt="avatar">
        </div>
        <h1>dakovv</h1>
        <div class="badge">
            <span>✧</span> ♥Цавт танем♥ <span>✧</span>
        </div>
        <div class="badge" style="background:#00000066; margin-top: 5px;">
            📍 Russia, Stavropol
        </div>
    </div>

    <div class="discord-rpc" id="rpcContainer">
        <div class="loading-rpc">
            <div class="green-dot"></div> Discord RPC — загрузка статуса...
        </div>
    </div>

    <div class="links-grid">
        <a href="https://t.me/DakovvDen" target="_blank" rel="noopener noreferrer" class="link-btn">
            <div class="btn-left">
                <span class="btn-icon">📱</span>
                <span>Telegram</span>
            </div>
            <span class="arrow-icon">↗</span>
        </a>

        <a href="https://github.com/oleg0999" target="_blank" rel="noopener noreferrer" class="link-btn">
            <div class="btn-left">
                <span class="btn-icon">🐙</span>
                <span>GitHub</span>
            </div>
            <span class="arrow-icon">↗</span>
        </a>

        <a href="https://steamcommunity.com/id/ArmKitsun/" target="_blank" rel="noopener noreferrer" class="link-btn">
            <div class="btn-left">
                <span class="btn-icon">🎮</span>
                <span>Steam</span>
            </div>
            <span class="arrow-icon">↗</span>
        </a>

        <a href="https://www.youtube.com/@Dakovvv-v2m" target="_blank" rel="noopener noreferrer" class="link-btn">
            <div class="btn-left">
                <span class="btn-icon">📸</span>
                <span>YouTube</span>
            </div>
            <span class="arrow-icon">↗</span>
        </a>

        <a href="https://drive.google.com/drive/folders/1k3oMML1SEcCWAPcCDT-nNQ8oipL5t-JI?usp=drive_link" target="_blank" rel="noopener noreferrer" class="link-btn">
            <div class="btn-left">
                <span class="btn-icon">💿</span>
                <span>Google disk</span>
            </div>
            <span class="arrow-icon">↗</span>
        </a>
    </div>

    <!-- Динамический футер с активностью вместо статичной цитаты -->
    <div class="activity-footer" id="dynamicActivity">
        <div class="activity-name" id="activityName">🔄 Загрузка активности...</div>
        <div class="activity-details" id="activityDetails"></div>
    </div>
</div>

<script>
    const DISCORD_USER_ID = "489975528464449536";
    const defaultAvatarUrl = "https://cdn.discordapp.com/embed/avatars/0.png";

    let socket = null;
    let reconnectTimeout = null;

    // Функция для обновления активности в футере
    function updateFooterActivity(data) {
        const activities = data?.activities || [];
        const activityNameElem = document.getElementById('activityName');
        const activityDetailsElem = document.getElementById('activityDetails');
        
        if (!activityNameElem) return;
        
        if (activities.length > 0) {
            const primaryActivity = activities[0];
            const activityName = primaryActivity.name || '';
            const activityDetails = primaryActivity.details || '';
            const activityState = primaryActivity.state || '';
            const activityType = primaryActivity.type;
            
            let icon = "🎮";
            if (activityType === 2) icon = "🎵";
            else if (activityType === 3) icon = "📺";
            else if (activityType === 1) icon = "🎨";
            
            if (activityName && activityDetails) {
                activityNameElem.innerHTML = `${icon} ${activityName}`;
                activityDetailsElem.innerHTML = `${activityDetails} ${activityState ? '· ' + activityState : ''}`;
            } else if (activityName) {
                activityNameElem.innerHTML = `${icon} Сейчас: ${activityName}`;
                activityDetailsElem.innerHTML = activityState || 'Активен в Discord';
            } else {
                activityNameElem.innerHTML = `💤 Не активен`;
                activityDetailsElem.innerHTML = `Нет запущенных игр или приложений`;
            }
        } else {
            activityNameElem.innerHTML = `💤 Не активен`;
            activityDetailsElem.innerHTML = `Нет запущенных игр или приложений`;
        }
    }

    // Функция для получения картинки активности
    function getActivityImage(activity) {
        if (!activity) return null;
        
        // Для Spotify
        if (activity.name === "Spotify" && activity.assets?.large_image) {
            return `https://i.scdn.co/image/${activity.assets.large_image.replace('spotify:', '')}`;
        }
        // Для других игр/приложений
        if (activity.assets?.large_image) {
            if (activity.assets.large_image.startsWith('mp:external/')) {
                const externalId = activity.assets.large_image.replace('mp:external/', '');
                return `https://media.discordapp.net/external/${externalId}`;
            }
            if (activity.application_id) {
                return `https://cdn.discordapp.com/app-assets/${activity.application_id}/${activity.assets.large_image}.png`;
            }
        }
        return null;
    }

    function updateRPCUI(data) {
        const container = document.getElementById('rpcContainer');
        if (!container) return;

        const activities = data?.activities || [];
        const discordStatus = data?.discord_status || 'offline';
        
        let statusColor = '';
        let statusText = '';
        switch(discordStatus) {
            case 'online': statusColor = '#23a55a'; statusText = 'В сети'; break;
            case 'idle': statusColor = '#faa81a'; statusText = 'Не активен'; break;
            case 'dnd': statusColor = '#ed4245'; statusText = 'Не беспокоить'; break;
            default: statusColor = '#747f8d'; statusText = 'Не в сети';
        }

        let primaryActivity = null;
        if (activities.length > 0) {
            primaryActivity = activities[0];
        }

        let rpcName = '';
        let rpcDetails = '';
        let rpcState = '';
        let largeImageText = '';
        let activityImageUrl = null;

        if (primaryActivity) {
            rpcName = primaryActivity.name || '';
            rpcDetails = primaryActivity.details || '';
            rpcState = primaryActivity.state || '';
            largeImageText = primaryActivity.assets?.large_text || '';
            activityImageUrl = getActivityImage(primaryActivity);
        }

        let rpcHtml = `
            <div class="rpc-status">
                <img class="rpc-avatar" id="dynamicAvatar" src="${defaultAvatarUrl}" alt="avatar">
                <div class="rpc-text">
                    <div class="rpc-line">
                        <span class="green-dot" style="background: ${statusColor}; box-shadow:0 0 4px ${statusColor};"></span>
                        <span style="margin-left: 6px;">${statusText} · <strong>${data?.discord_user?.global_name || data?.discord_user?.username || 'dakovv'}</strong></span>
                    </div>
        `;

        if (primaryActivity) {
            rpcHtml += `<div class="rpc-detail">`;
            
            // Показываем картинку активности если она есть
            if (activityImageUrl) {
                rpcHtml += `<img class="activity-image" src="${activityImageUrl}" alt="activity image" style="width: 32px; height: 32px; border-radius: 8px;">`;
            } else {
                rpcHtml += `<span>🎮</span>`;
            }
            
            rpcHtml += `<strong>${escapeHtml(rpcName)}</strong>`;
            if (rpcDetails) rpcHtml += ` &nbsp;• ${escapeHtml(rpcDetails)}`;
            if (rpcState) rpcHtml += ` &nbsp;— ${escapeHtml(rpcState)}`;
            if (largeImageText) rpcHtml += `<span style="margin-left: 8px;">🖼️ ${escapeHtml(largeImageText)}</span>`;
            rpcHtml += `</div>`;
        } else {
            rpcHtml += `<div class="rpc-detail">💤 Без активности / не играет</div>`;
        }

        rpcHtml += `<div class="rpc-detail" style="margin-top: 6px; font-size:0.7rem;">✨ Discord RPC в реальном времени</div>`;
        rpcHtml += `</div></div>`;

        container.innerHTML = rpcHtml;

        // Обновляем футер с активностью
        updateFooterActivity(data);

        if (data?.discord_user?.avatar) {
            const avatarHash = data.discord_user.avatar;
            const avatarUrl = `https://cdn.discordapp.com/avatars/${DISCORD_USER_ID}/${avatarHash}.png?size=80`;
            const avatarImg = document.getElementById('dynamicAvatar');
            if (avatarImg) avatarImg.src = avatarUrl;
            const mainAvatar = document.querySelector('.avatar');
            if (mainAvatar) mainAvatar.src = avatarUrl;
        } else {
            const fallbackAvatar = `https://cdn.discordapp.com/avatars/${DISCORD_USER_ID}/${data?.discord_user?.avatar || '0'}.png?size=80`;
            const avatarImg = document.getElementById('dynamicAvatar');
            if (avatarImg) avatarImg.src = fallbackAvatar;
            const mainAvatar = document.querySelector('.avatar');
            if (mainAvatar && data?.discord_user?.avatar === undefined) mainAvatar.src = `https://cdn.discordapp.com/avatars/${DISCORD_USER_ID}/0.png`;
        }

        if(data?.discord_user?.global_name) {
            const nameHeader = document.querySelector('h1');
            if(nameHeader && nameHeader.innerText !== data.discord_user.global_name) {
                nameHeader.innerText = data.discord_user.global_name;
            }
        }
    }

    function showRPCError() {
        const container = document.getElementById('rpcContainer');
        if(!container) return;
        container.innerHTML = `
            <div class="rpc-status">
                <div class="rpc-text">
                    <div class="rpc-line">🎵 Discord RPC не загружен</div>
                    <div class="rpc-detail">Пользователь ${DISCORD_USER_ID} возможно оффлайн или скрыт.</div>
                    <div class="rpc-detail" style="font-size:0.7rem;">⚡ Lanyard API — демо-режим</div>
                </div>
            </div>
        `;
        const activityNameElem = document.getElementById('activityName');
        if(activityNameElem) {
            activityNameElem.innerHTML = `⚠️ Не удалось загрузить активность`;
            document.getElementById('activityDetails').innerHTML = `Проверьте ID пользователя или подключение`;
        }
    }

    function initLanyard() {
        if (socket && socket.readyState === WebSocket.OPEN) {
            socket.close();
        }
        const ws = new WebSocket("wss://api.lanyard.rest/socket");
        
        ws.addEventListener("open", () => {
            ws.send(JSON.stringify({
                op: 2,
                d: {
                    subscribe_to_id: DISCORD_USER_ID
                }
            }));
        });
        
        ws.addEventListener("message", (event) => {
            try {
                const packet = JSON.parse(event.data);
                if (packet.op === 1) {
                    if (ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({ op: 1 }));
                    }
                }
                if (packet.op === 0 && (packet.t === "INIT_STATE" || packet.t === "PRESENCE_UPDATE")) {
                    const userData = packet.d;
                    if (userData && (userData.discord_user?.id === DISCORD_USER_ID || userData.user_id === DISCORD_USER_ID)) {
                        updateRPCUI(userData);
                    }
                }
            } catch(e) { console.warn(e); }
        });
        
        ws.addEventListener("error", () => {
            console.warn("Lanyard WS ошибка");
            showRPCError();
        });
        
        ws.addEventListener("close", () => {
            if (reconnectTimeout) clearTimeout(reconnectTimeout);
            reconnectTimeout = setTimeout(() => initLanyard(), 5000);
        });
        
        socket = ws;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    async function fetchInitialAvatarAndStatus() {
        try {
            const restRes = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_USER_ID}`);
            if (restRes.ok) {
                const json = await restRes.json();
                if (json.success && json.data) {
                    updateRPCUI(json.data);
                } else {
                    const avatarUrl = `https://cdn.discordapp.com/avatars/${DISCORD_USER_ID}/0.png?size=120`;
                    document.querySelector('.avatar')?.setAttribute('src', avatarUrl);
                }
            }
        } catch(e) {
            console.log("Не удалось загрузить данные по REST");
        }
    }
    
    fetchInitialAvatarAndStatus();
    initLanyard();

    setInterval(() => {
        if (!socket || socket.readyState !== WebSocket.OPEN) {
            fetchInitialAvatarAndStatus();
        }
    }, 45000);
</script>
</body>
</html>
